<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — É pra mim?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f4f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }

    .login-logo {
      font-size: 20px;
      font-weight: 600;
      color: #4eabb6;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 13px;
      color: #999;
      margin-bottom: 28px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 16px;
    }

    .field label {
      font-size: 12px;
      color: #666;
      font-weight: 500;
    }

    .field input {
      border: 1px solid #e5e7eb;
      border-radius: 7px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: #4eabb6; }

    .btn {
      width: 100%;
      padding: 11px;
      background: #4eabb6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    .btn:hover { background: #2d8a96; }

    .alert-error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">É pra mim?</div>
    <div class="login-sub">Admin panel</div>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin/login">
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter admin password" autofocus />
      </div>
      <button type="submit" class="btn">Sign in</button>
    </form>
  </div>
</body>
</html>
