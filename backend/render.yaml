services:
  - type: web
    name: epramim-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ENVIRONMENT
        value: production